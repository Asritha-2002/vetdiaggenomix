<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .sidebar-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #475569 100%);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glow-effect {
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }
        
        .nav-item {
            position: relative;
            overflow: hidden;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }
        
        .nav-item:hover::before {
            left: 100%;
        }
        
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .stats-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.9) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .animated-gradient {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .pulse-glow {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
            }
            50% {
                opacity: 0.7;
                box-shadow: 0 0 30px rgba(102, 126, 234, 0.7);
            }
        }
        
        .scroll-smooth {
            scroll-behavior: smooth;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5a67d8, #6b46c1);
        }

        /* Mobile sidebar fixes */
        @media (max-width: 1023px) {
            #sidebar {
                z-index: 50;
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                overflow-y: auto;
            }
            
            #sidebar.-translate-x-full {
                transform: translateX(-100%);
            }
            
            #sidebar:not(.-translate-x-full) {
                transform: translateX(0);
            }
        }

        /* Overlay for mobile sidebar */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>

    <script>
        // Enhanced sidebar toggle with smooth animations
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = !sidebar.classList.contains('-translate-x-full');
            
            if (isOpen) {
                // Close sidebar
                sidebar.classList.add('-translate-x-full');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                // Open sidebar
                sidebar.classList.remove('-translate-x-full');
                if (overlay) overlay.classList.add('active');
                sidebar.style.animation = 'slideInLeft 0.3s ease-out';
                if (window.innerWidth < 1024) {
                    document.body.style.overflow = 'hidden';
                }
            }
        }

        // Enhanced navigation handling
        document.addEventListener('DOMContentLoaded', () => {
            const sidebarNav = document.getElementById('sidebarNav');
            if (sidebarNav) {
                sidebarNav.addEventListener('click', (e) => {
                    // Remove active state from all nav links
                    document.querySelectorAll('.nav-link').forEach(link => {
                        link.classList.remove('bg-white/20', 'scale-105');
                    });
                    
                    // Add active state to clicked link
                    if (e.target.closest('.nav-link')) {
                        e.target.closest('.nav-link').classList.add('bg-white/20', 'scale-105');
                    }
                    
                    // Auto-close sidebar on mobile
                    if (window.innerWidth < 1024) {
                        setTimeout(() => {
                            const sidebar = document.getElementById('sidebar');
                            sidebar.classList.add('-translate-x-full');
                        }, 150);
                    }
                });
            }
        });

        // Close sidebar when clicking outside (mobile)
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const mobileMenuButtons = document.querySelectorAll('[onclick="toggleSidebar()"]');
            const hamburgerButton = document.querySelector('.lg\\:hidden [onclick="toggleSidebar()"]');
            
            // Handle overlay click
            if (overlay && overlay.contains(e.target) && overlay === e.target) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
                return;
            }
            
            // Check if click is outside sidebar and not on menu buttons
            let clickedOnMenuButton = false;
            mobileMenuButtons.forEach(btn => {
                if (btn && btn.contains(e.target)) {
                    clickedOnMenuButton = true;
                }
            });
            
            if (hamburgerButton && hamburgerButton.contains(e.target)) {
                clickedOnMenuButton = true;
            }
            
            if (window.innerWidth < 1024 && 
                sidebar &&
                !sidebar.contains(e.target) && 
                !clickedOnMenuButton &&
                !sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.add('-translate-x-full');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            if (window.innerWidth >= 1024) {
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // Enhanced modal close function
        function closeOrderModal() {
            const modal = document.getElementById('order-modal');
            if (modal) {
                modal.style.animation = 'fadeOut 0.3s ease-out';
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.style.animation = '';
                }, 300);
            }
        }

        // Add smooth loading animations
        document.addEventListener('DOMContentLoaded', () => {
            // Animate elements on load
            const elements = document.querySelectorAll('.nav-link, .stats-card');
            elements.forEach((el, index) => {
                if (el) {
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(20px)';
                    setTimeout(() => {
                        el.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                    }, index * 100);
                }
            });
        });

        // Handle window resize to properly show/hide sidebar
        window.addEventListener('resize', () => {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth >= 1024) {
                // Desktop - ensure sidebar is visible
                sidebar.classList.remove('-translate-x-full');
            } else {
                // Mobile - ensure sidebar is hidden by default
                sidebar.classList.add('-translate-x-full');
            }
        });

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInLeft {
                from { transform: translateX(-100%); opacity: 0.8; }
                to { transform: translateX(0); opacity: 1; }
            }
            
            @keyframes fadeOut {
                from { opacity: 1; }
                to { opacity: 0; }
            }
            
            @keyframes fadeIn {
                from { opacity: 0; transform: scale(0.9); }
                to { opacity: 1; transform: scale(1); }
            }

            /* Ensure proper mobile sidebar behavior */
            @media (max-width: 1023px) {
                #sidebar {
                    transform: translateX(-100%);
                }
                #sidebar:not(.-translate-x-full) {
                    transform: translateX(0);
                }
            }
        `;
        document.head.appendChild(style);
    </script>

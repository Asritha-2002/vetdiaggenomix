<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - VetDiag Genomix</title>
    <script src="./js/tailwindcss.min.js"></script>
    <link rel="icon" href="https://www.vetdiaggenomix.com/assets/img/ICON%2001.png" type="image/x-icon">
    <script src="/js/api.js"></script>
    <script src="/js/alert.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full mx-4">
        <div id="verification-card" class="bg-white rounded-2xl p-8 shadow-xl">
            <div class="text-center">
                <img src="https://www.vetdiaggenomix.com/assets/img/ICON%2001.png" alt="Logo" class="h-16 w-16 mx-auto mb-6">
                <h1 class="text-2xl font-bold mb-4">Email Verification</h1>
                <div id="verification-message">
                    <p class="text-gray-600">Verifying your email...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function verifyEmail() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');
                
                if (!token) {
                    throw new Error('Verification token not found');
                }

                await api.verifyEmail(token);
                
                document.getElementById('verification-message').innerHTML = `
                    <div class="text-green-600 mb-6">
                        <i class="fas fa-check-circle text-4xl"></i>
                        <p class="mt-2">Email verified successfully!</p>
                    </div>
                    <a href="/" class="inline-block bg-red-600 text-white px-6 py-2 rounded-full hover:bg-red-700">
                        Continue to Homepage
                    </a>
                `;
            } catch (error) {
                document.getElementById('verification-message').innerHTML = `
                    <div class="text-red-600 mb-6">
                        <i class="fas fa-times-circle text-4xl"></i>
                        <p class="mt-2">${error.message || 'Verification failed'}</p>
                    </div>
                    <a href="/" class="inline-block bg-red-600 text-white px-6 py-2 rounded-full hover:bg-red-700">
                        Return to Homepage
                    </a>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', verifyEmail);
    </script>
</body>
</html>

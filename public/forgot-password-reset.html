<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - VetDiag Genomix</title>
    <script src="./js/tailwindcss.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://www.vetdiaggenomix.com/assets/img/ICON%2001.png" type="image/x-icon">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <a href="/" class="inline-block">
                    <img src="https://www.vetdiaggenomix.com/assets/img/ICON%2001.png" alt="Logo" class="h-12 w-12 mx-auto mb-4">
                </a>
                <h1 class="text-2xl font-bold">Reset Your Password</h1>
                <p class="text-gray-600 mt-2">Please enter your new password below</p>
            </div>

            <form id="reset-password-form" class="space-y-6">
                <input type="hidden" id="reset-token">
                <div>
                    <label class="block text-gray-700 mb-2">New Password</label>
                    <input type="password" name="password" required minlength="6"
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600">
                    <p class="text-sm text-gray-500 mt-1">Password must be at least 6 characters long</p>
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Confirm Password</label>
                    <input type="password" name="confirmPassword" required minlength="6"
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600">
                </div>
                <button type="submit" 
                        class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 transition-colors">
                    Reset Password
                </button>
            </form>

            <div id="success-message" class="hidden mt-6 text-center">
                <div class="text-green-500 mb-4">
                    <i class="fas fa-check-circle text-4xl"></i>
                </div>
                <h2 class="text-xl font-bold mb-2">Password Reset Successful!</h2>
                <p class="text-gray-600 mb-4">Your password has been successfully updated.</p>
                <a href="/" class="text-red-600 hover:text-red-700">Return to Homepage</a>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/alert.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                alert('Invalid or missing reset token');
                window.location.href = '/';
                return;
            }

            document.getElementById('reset-token').value = token;

            document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const password = e.target.password.value;
                const confirmPassword = e.target.confirmPassword.value;

                if (password !== confirmPassword) {
                    showAlert('error', 'Passwords do not match');
                    return;
                }

                try {
                    await api.resetPassword(token, password);
                    
                    // Hide form and show success message
                    e.target.classList.add('hidden');
                    document.getElementById('success-message').classList.remove('hidden');
                    
                    // Redirect to login page after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/?openLogin=true';
                    }, 3000);
                } catch (error) {
                    showAlert('error', error.message || 'Failed to reset password');
                }
            });
        });

        function showAlert(type, message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `fixed top-4 right-4 p-4 rounded-lg ${
                type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'
            }`;
            alertDiv.textContent = message;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }
    </script>
</body>
</html>

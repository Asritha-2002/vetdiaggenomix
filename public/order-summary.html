<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary</title>
    <script src="./js/tailwindcss.min.js"></script>
    <link rel="stylesheet" href="/css/nav.css">

</head>
<body class="bg-gray-50">
           <!-- Auth Modals -->
           <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
            <div class="flex items-center justify-center min-h-screen px-4">
                <div class="bg-white rounded-2xl p-8 max-w-md w-full relative">
                    <button onclick="toggleModal('login-modal')" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                    <h2 class="text-2xl font-bold mb-6">Login</h2>
                    <form id="login-form" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2">Email</label>
                            <input type="email" name="email" required
                                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">Password</label>
                            <input type="password" name="password" required
                                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600">
                        </div>
                        <button type="submit" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700">
                            Login
                        </button>
                    </form>
                    <p class="mt-4 text-center text-gray-600">
                        Don't have an account? 
                        <a href="#" onclick="switchModal('login-modal', 'signup-modal')" class="text-red-600 hover:text-red-700">Sign up</a>
                    </p>
                </div>
            </div>
        </div>
    
        <div id="signup-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
            <div class="flex items-center justify-center min-h-screen px-4">
                <div class="bg-white rounded-2xl p-8 max-w-md w-full relative">
                    <button onclick="toggleModal('signup-modal')" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                    <h2 class="text-2xl font-bold mb-6">Sign Up</h2>
                    <form id="signup-form" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2">Name</label>
                            <input type="text" name="name" required
                                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">Email</label>
                            <input type="email" name="email" required
                                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2">Password</label>
                            <input type="password" name="password" required
                                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-600">
                        </div>
                        <button type="submit" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700">
                            Sign Up
                        </button>
                    </form>
                    <p class="mt-4 text-center text-gray-600">
                        Already have an account? 
                        <a href="#" onclick="switchModal('signup-modal', 'login-modal')" class="text-red-600 hover:text-red-700">Login</a>
                    </p>
                </div>
            </div>
        </div>
    
        <!-- Cart Sidebar -->
        <div id="cart-sidebar" class="cart-sidebar fixed right-0 w-96 shadow-2xl transform translate-x-full transition-transform duration-300 z-40">
            <div class="h-full flex flex-col">
                <div class="p-6 border-b border-red-100">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">Your Cart</h2>
                            <p class="text-sm text-gray-500 mt-1">Free shipping on orders over ₹499</p>
                        </div>
                        <button onclick="toggleCart()" class="p-2 hover:bg-red-50 rounded-full transition-colors">
                            <i class="fas fa-times text-gray-400 hover:text-red-600 text-xl"></i>
                        </button>
                    </div>
                </div>
                
                <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
                    <!-- Cart items will be loaded here -->
                </div>
    
                <div class="p-6 border-t border-red-100 bg-white">
                    <div class="flex justify-between items-center mb-4">
                        <div>
                            <p class="text-sm text-gray-500">Subtotal</p>
                            <p id="cart-total" class="text-2xl font-bold text-gray-800">₹0</p>
                        </div>
                        <span id="cart-count" class="px-4 py-2 bg-red-50 text-red-600 rounded-full text-sm font-medium">
                            0 items
                        </span>
                    </div>
                    <button onclick="checkout()" class="cart-checkout-btn w-full py-4 rounded-xl text-white font-medium">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    
        <!-- Header -->
        <header class="fixed w-full z-30 glass-effect shadow-lg mb-10">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex justify-between items-center h-16">
                    <!-- Logo -->
                    <a href="/" class="flex items-center gap-3">
                        <img src="https://www.vetdiaggenomix.com/assets/img/ICON%2001.png" alt="Logo" class="h-8 w-8 rounded-lg"/>
                        <span class="font-medium text-red-600 text-lg">VetDiag Genomix</span>
                    </a>
    
                    <!-- Desktop Navigation -->
                    <nav class="hidden md:flex items-center gap-8">
                        <a href="/" class="text-gray-700 hover:text-red-600 transition-colors">Home</a>
                        <a href="/products" class="text-gray-700 hover:text-red-600 transition-colors">Products</a>
                        <a href="/about" class="text-gray-700 hover:text-red-600 transition-colors">About</a>
                        <a href="/contact" class="text-gray-700 hover:text-red-600 transition-colors">Contact</a>
                    </nav>
    
                    <!-- User Actions -->
                    <div class="flex items-center gap-4">
                        <button class="text-gray-700 hover:text-red-600">
                            <i class="fas fa-search text-xl"></i>
                        </button>
                        <button id="auth-button" onclick="toggleModal('login-modal')" class="text-gray-700 hover:text-red-600">
                            <i class="fas fa-user text-xl"></i>
                        </button>
                        <button onclick="toggleCart()" class="text-gray-700 hover:text-red-600 relative">
                            <i class="fas fa-shopping-cart text-xl"></i>
                            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
                        </button>
                        <button class="md:hidden text-gray-700 hover:text-red-600" onclick="toggleMobileMenu()">
                            <i class="fas fa-bars text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
                <nav class="px-4 py-2">
                    <a href="/" class="block py-2 text-gray-700 hover:text-red-600">Home</a>
                    <a href="/products" class="block py-2 text-gray-700 hover:text-red-600">Products</a>
                    <a href="/about" class="block py-2 text-gray-700 hover:text-red-600">About</a>
                    <a href="/contact" class="block py-2 text-gray-700 hover:text-red-600">Contact</a>
                </nav>
            </div>
        </header>

    <main class="max-w-3xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Order Summary</h1>
        <div class="bg-white rounded-lg shadow p-6">
            <div id="itemsList" class="divide-y"></div>
            <div class="border-t mt-6 pt-6">
                <div id="subtotal" class="flex justify-between text-gray-600 mb-2"></div>
                <div id="tax" class="flex justify-between text-gray-600 mb-2"></div>
                <div id="total" class="flex justify-between text-xl font-bold mt-4"></div>
            </div>
            <form id="checkoutForm" class="mt-8 space-y-4">
                <input type="text" placeholder="Name" required class="w-full border rounded-lg px-4 py-2">
                <input type="email" placeholder="Email" required class="w-full border rounded-lg px-4 py-2">
                <input type="text" placeholder="Address" required class="w-full border rounded-lg px-4 py-2">
                <button type="submit" class="w-full bg-red-600 text-white rounded-lg px-4 py-2 hover:bg-red-700">
                    Complete Purchase
                </button>
            </form>
        </div>
    </main>

    <script src="js/order-summary.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/product-details.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/nav.js"></script>
</body>
</html>

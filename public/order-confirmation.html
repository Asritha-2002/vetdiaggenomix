<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Books E-Commerce</title>
    <script src="./js/tailwindcss.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center gap-3">
                        <img src="https://www.vetdiaggenomix.com/assets/img/ICON%2001.png" alt="Logo" class="h-8 w-8 rounded-lg"/>
                        <span class="font-medium text-red-600 text-lg">VetDiag Genomix</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <button id="auth-button" class="text-gray-700 hover:text-red-600 transition-colors">
                        <!-- Auth button content will be set by auth.js -->
                    </button>
                    <button onclick="window.print()" class="text-gray-700 hover:text-red-600 transition-colors print:hidden">
                        <i class="fas fa-print"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-8 px-4 space-y-6">
        <div class="text-center py-8">
            <i class="fas fa-check-circle text-green-500 text-6xl mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-900">Thank You for Your Order!</h1>
            <p class="text-gray-600 mt-2">We'll send you a confirmation email shortly</p>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <!-- Order Status Card -->
            <div class="md:col-span-3 bg-white rounded-xl shadow-sm p-6">
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <div class="space-y-1">
                        <p class="text-sm text-gray-500">Order ID</p>
                        <p id="order-id" class="font-medium"></p>
                    </div>
                    <div class="space-y-1">
                        <p class="text-sm text-gray-500">Date</p>
                        <p id="order-date" class="font-medium"></p>
                    </div>
                    <div class="space-y-1">
                        <p class="text-sm text-gray-500">Payment ID</p>
                        <p id="payment-id" class="font-medium"></p>
                    </div>
                    <div class="space-y-1">
                        <p class="text-sm text-gray-500">Status</p>
                        <span id="order-status" class="px-3 py-1 rounded-full text-sm font-medium"></span>
                    </div>
                </div>
            </div>

            <!-- Order Items -->
            <div class="md:col-span-2 space-y-6">
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-xl font-semibold mb-4">Order Items</h2>
                    <div id="order-items" class="divide-y"></div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-xl font-semibold mb-4">Delivery Address</h2>
                    <div id="delivery-address" class="text-gray-600 space-y-1"></div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="md:col-span-1">
                <div class="bg-white rounded-xl shadow-sm p-6 sticky top-4">
                    <h2 class="text-xl font-semibold mb-4">Order Summary</h2>
                    <div class="space-y-3 text-gray-600">
                        <div class="flex justify-between">
                            <span>Subtotal</span>
                            <span id="subtotal"></span>
                        </div>
                        <div id="tax-details"></div>
                        <div class="flex justify-between">
                            <span>Payment Charge</span>
                            <span id="payment-charge"></span>
                        </div>
                        <div class="flex justify-between">
                            <span>Delivery Charge</span>
                            <span id="delivery-charge"></span>
                        </div>
                        <div class="flex justify-between text-red-600">
                            <span>Discount</span>
                            <span id="discount"></span>
                        </div>
                        <div class="flex justify-between font-bold text-lg text-gray-900 pt-4 border-t">
                            <span>Total</span>
                            <span id="total"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center py-8">
            <a href="/" class="inline-flex items-center px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>
                Continue Shopping
            </a>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/order-confirmation.js"></script>

    <style>
        @media print {
            nav { display: none; }
            .print\\:hidden { display: none; }
            main { padding: 0; }
            body { background: white; }
            .shadow-sm { box-shadow: none; }
        }
    </style>
</body>
</html>
